<!DOCTYPE html>
<!-- Navigable user-guide shell. Rendered by user-guide-builder/scripts/render-guide.mjs from a
     markdown guide + docs/brand.json. Self-contained; filtering/scrollspy are progressive JS. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
{{ROOT_CSS}}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.7;
    -webkit-font-smoothing:antialiased;letter-spacing:-0.006em;
    background-image:
      radial-gradient(110% 50% at 50% -10%, color-mix(in oklab,var(--brand) 14%, transparent), transparent 60%),
      linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:auto,34px 34px,34px 34px;}
  a{color:var(--brand);text-decoration:none}
  a:hover{text-decoration:underline}

  .layout{max-width:var(--maxw);margin:0 auto;display:grid;grid-template-columns:var(--sidebar-w) minmax(0,1fr);gap:2.5rem;padding:0 1.4rem}
  .toc-toggle{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}

  /* ---------------- sidebar ---------------- */
  .sidebar{position:sticky;top:0;align-self:start;height:100vh;overflow-y:auto;padding:1.6rem 0 2rem;
    scrollbar-width:thin}
  .brand{display:flex;align-items:center;gap:.6rem;margin-bottom:.3rem}
  .brand .logo{width:1.7rem;height:1.7rem;border-radius:7px;background:var(--brand);display:grid;place-items:center;
    color:#fff;font-family:var(--font-display);font-weight:700;font-size:.95rem;flex:none}
  .brand .name{font-family:var(--font-display);font-weight:700;color:var(--heading);font-size:1.05rem;letter-spacing:-0.02em}
  .ver{display:inline-block;font-family:var(--font-mono);font-size:.72rem;color:var(--brand);
    border:1px solid color-mix(in oklab,var(--brand) 40%,var(--border));border-radius:6px;padding:.06rem .4rem;margin:.5rem 0 1rem;
    background:color-mix(in oklab,var(--brand) 10%,transparent)}
  .toc-search{width:100%;font:inherit;font-size:.85rem;color:var(--text);background:var(--surface);
    border:1px solid var(--border);border-radius:9px;padding:.5rem .7rem;margin-bottom:.9rem;outline:none}
  .toc-search:focus{border-color:var(--brand)}
  .toc-search::placeholder{color:var(--muted)}
  .toc{display:block}
  .toc a{display:block;color:var(--muted);font-size:.86rem;padding:.27rem .65rem;border-left:2px solid transparent;
    border-radius:0 6px 6px 0;text-decoration:none;transition:color .15s,border-color .15s,background .15s}
  .toc a:hover{color:var(--text);background:var(--surface)}
  .toc a.lvl3{padding-left:1.5rem;font-size:.81rem}
  .toc a.active{color:var(--heading);border-left-color:var(--brand);background:color-mix(in oklab,var(--brand) 10%,transparent)}
  .toc-label{display:none}

  /* ---------------- content ---------------- */
  .content{padding:2.4rem 0 5rem;min-width:0}
  .content :where(h1,h2,h3,h4){font-family:var(--font-display);color:var(--heading);letter-spacing:-0.025em;line-height:1.15;scroll-margin-top:1.2rem}
  .content h1{font-size:clamp(2rem,5vw,2.7rem);margin:0 0 .3rem}
  .content h2{font-size:1.5rem;margin:2.8rem 0 1rem;padding-top:1.6rem;border-top:1px solid var(--border-soft)}
  .content h3{font-size:1.14rem;margin:1.8rem 0 .6rem;color:var(--heading)}
  .content h4{font-size:1rem;margin:1.3rem 0 .4rem;color:var(--text)}
  .content p{margin:.85rem 0;color:var(--text)}
  .content strong{color:var(--heading);font-weight:700}
  .content a{color:var(--brand)}
  .content ul,.content ol{margin:.8rem 0;padding-left:1.3rem;color:var(--text)}
  .content li{margin:.34rem 0}
  .content li::marker{color:var(--muted)}
  .content code{font-family:var(--font-mono);font-size:.84em;background:var(--surface);border:1px solid var(--border-soft);
    border-radius:5px;padding:.08em .35em;color:var(--accent-ink)}
  .content pre{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:1rem 1.1rem;overflow:auto;margin:1.1rem 0}
  .content pre code{background:none;border:0;padding:0;color:var(--text);font-size:.85rem;line-height:1.6}
  .content blockquote{margin:1.1rem 0;padding:.7rem 1.1rem;border-left:3px solid var(--brand);
    background:color-mix(in oklab,var(--brand) 7%,transparent);border-radius:0 9px 9px 0;color:var(--muted)}
  .content blockquote p{margin:.2rem 0}
  .content hr{border:0;border-top:1px solid var(--border-soft);margin:2rem 0}
  .content img{max-width:100%;height:auto;border:1px solid var(--border);border-radius:11px;margin:1rem 0;display:block}
  .table-wrap{overflow-x:auto;margin:1.1rem 0;border:1px solid var(--border);border-radius:11px}
  .content table{border-collapse:collapse;width:100%;font-size:.9rem}
  .content th,.content td{text-align:left;padding:.6rem .85rem;border-bottom:1px solid var(--border-soft);vertical-align:top}
  .content thead th{background:var(--surface);color:var(--heading);font-weight:600;font-family:var(--font-body);
    position:sticky;top:0;white-space:nowrap}
  .content tbody tr:last-child td{border-bottom:0}
  .content tbody tr:hover{background:color-mix(in oklab,var(--brand) 5%,transparent)}

  .hero-tag{color:var(--muted);font-size:1.05rem;margin:.1rem 0 0}
  .foot{margin-top:3rem;padding-top:1.4rem;border-top:1px solid var(--border-soft);color:var(--muted);font-size:.82rem}
  .foot .mono{font-family:var(--font-mono)}

  /* ---------------- responsive ---------------- */
  @media (max-width:860px){
    .layout{grid-template-columns:1fr;gap:0}
    .sidebar{position:static;height:auto;padding:1.4rem 0 .4rem;border-bottom:1px solid var(--border-soft)}
    .toc-label{display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:var(--heading);
      font-weight:600;font-size:.92rem;padding:.5rem 0;font-family:var(--font-body)}
    .toc-label .chev{transition:transform .2s;color:var(--muted)}
    .toc,.toc-search{display:none}
    #toc-toggle:checked ~ .sidebar .toc,#toc-toggle:checked ~ .sidebar .toc-search{display:block}
    #toc-toggle:checked ~ .sidebar .toc-label .chev{transform:rotate(180deg)}
    .content{padding:1.4rem 0 4rem}
  }
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
</style>
</head>
<body>
<div class="layout">
  <input type="checkbox" id="toc-toggle" class="toc-toggle">
  <aside class="sidebar">
    <div class="brand"><span class="logo">{{INITIAL}}</span><span class="name">{{PRODUCT}}</span></div>
    <span class="ver">v{{VERSION}}</span>
    <label for="toc-toggle" class="toc-label">On this page <span class="chev">▾</span></label>
    <input type="search" class="toc-search" placeholder="Filter sections…" aria-label="Filter sections">
    <nav class="toc" aria-label="Table of contents">
{{TOC}}
    </nav>
  </aside>
  <main class="content">
{{CONTENT}}
    <div class="foot">{{PRODUCT}} user guide · <span class="mono">v{{VERSION}}</span> · updated {{UPDATED}}</div>
  </main>
</div>
<script>
  (function(){
    var links=[].slice.call(document.querySelectorAll('.toc a'));
    var search=document.querySelector('.toc-search');
    if(search){search.addEventListener('input',function(){
      var q=search.value.toLowerCase();
      links.forEach(function(a){a.style.display=a.textContent.toLowerCase().indexOf(q)>-1?'':'none';});
    });}
    var ids=links.map(function(a){return a.getAttribute('href').slice(1);});
    function spy(){
      var cur=ids[0];
      for(var i=0;i<ids.length;i++){
        var el=document.getElementById(ids[i]);
        if(el && el.getBoundingClientRect().top<=120) cur=ids[i];
      }
      links.forEach(function(a){a.classList.toggle('active',a.getAttribute('href').slice(1)===cur);});
    }
    document.addEventListener('scroll',spy,{passive:true});
    window.addEventListener('resize',spy);
    spy();
  })();
</script>
</body>
</html>
