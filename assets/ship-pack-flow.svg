<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380" width="1280" height="380" role="img" aria-label="One brand.json plus one version drives 12 outputs: user guide, changelog, screenshots, logo pack, brand kit, help bot, onboarding, FAQ, pitch deck, demo data, promo video, and launch kit.">
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="380" fill="#0c0e13"/>
  <rect width="1280" height="380" fill="url(#grid2)"/>

  <!-- source card -->
  <rect x="64" y="116" width="252" height="148" rx="14" fill="#14181f" stroke="#2a3342"/>
  <text x="88" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="3" fill="#6b7686">ONE SOURCE</text>
  <text x="88" y="192" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="600" fill="#48b6ff">brand.json</text>
  <text x="88" y="230" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="600" fill="#ffc24b">docs/VERSION</text>

  <!-- connector -->
  <path d="M316 190 H400" fill="none" stroke="#48b6ff" stroke-width="2"/>
  <path d="M392 182 l12 8 l-12 8" fill="none" stroke="#48b6ff" stroke-width="2"/>
  <text x="408" y="178" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" fill="#6b7686">drives</text>

  <!-- output chips: 4 columns x 3 rows -->
  <!-- row 1 -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="17">
    <rect x="470" y="60" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="494" cy="92" r="4" fill="#48b6ff"/><text x="510" y="98" fill="#d7dee8">User guide</text>
    <rect x="664" y="60" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="688" cy="92" r="4" fill="#48b6ff"/><text x="704" y="98" fill="#d7dee8">Changelog</text>
    <rect x="858" y="60" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="882" cy="92" r="4" fill="#48b6ff"/><text x="898" y="98" fill="#d7dee8">Screenshots</text>
    <rect x="1052" y="60" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="1076" cy="92" r="4" fill="#48b6ff"/><text x="1092" y="98" fill="#d7dee8">Logo pack</text>
    <!-- row 2 -->
    <rect x="470" y="158" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="494" cy="190" r="4" fill="#ffc24b"/><text x="510" y="196" fill="#d7dee8">Brand kit</text>
    <rect x="664" y="158" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="688" cy="190" r="4" fill="#ffc24b"/><text x="704" y="196" fill="#d7dee8">Help bot</text>
    <rect x="858" y="158" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="882" cy="190" r="4" fill="#ffc24b"/><text x="898" y="196" fill="#d7dee8">Onboarding</text>
    <rect x="1052" y="158" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="1076" cy="190" r="4" fill="#ffc24b"/><text x="1092" y="196" fill="#d7dee8">FAQ / help</text>
    <!-- row 3 -->
    <rect x="470" y="256" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="494" cy="288" r="4" fill="#46d39a"/><text x="510" y="294" fill="#d7dee8">Pitch deck</text>
    <rect x="664" y="256" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="688" cy="288" r="4" fill="#46d39a"/><text x="704" y="294" fill="#d7dee8">Demo + seed</text>
    <rect x="858" y="256" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="882" cy="288" r="4" fill="#46d39a"/><text x="898" y="294" fill="#d7dee8">Promo video</text>
    <rect x="1052" y="256" width="180" height="64" rx="11" fill="#13171f" stroke="#2a3342"/><circle cx="1076" cy="288" r="4" fill="#46d39a"/><text x="1092" y="294" fill="#d7dee8">Launch kit</text>
  </g>

  <text x="470" y="352" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#6b7686">One brand. One version. <tspan fill="#9fd0ff">/ship-release</tspan> keeps them all in sync.</text>
</svg>
